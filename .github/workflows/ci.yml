name: CI

on:
  push:
  pull_request:

env:
  GODOT_VERSION: 4.3-stable
  GODOT_TEMPLATES_VERSION: 4.3.stable
  GODOT_BINARY: Godot_v4.3-stable_linux.x86_64
  GODOT_LINUX_URL: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
  GODOT_TEMPLATES_URL: https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz

jobs:
  test:
    name: GUT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot
        run: |
          set -euo pipefail
          mkdir -p .godot-ci
          curl -L "$GODOT_LINUX_URL" -o .godot-ci/godot.zip
          unzip -q .godot-ci/godot.zip -d .godot-ci
          chmod +x ".godot-ci/$GODOT_BINARY"

      - name: Import project
        run: ".godot-ci/$GODOT_BINARY" --headless --import --path .

      - name: Run tests
        run: GODOT_BIN="$PWD/.godot-ci/$GODOT_BINARY" ./scripts/run_tests.sh

  export:
    name: Export
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot and export templates
        run: |
          set -euo pipefail
          mkdir -p .godot-ci "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATES_VERSION"
          curl -L "$GODOT_LINUX_URL" -o .godot-ci/godot.zip
          unzip -q .godot-ci/godot.zip -d .godot-ci
          chmod +x ".godot-ci/$GODOT_BINARY"
          curl -L "$GODOT_TEMPLATES_URL" -o .godot-ci/templates.tpz
          unzip -q .godot-ci/templates.tpz -d .godot-ci/templates
          cp -R .godot-ci/templates/templates/* "$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATES_VERSION/"

      - name: Import project
        run: ".godot-ci/$GODOT_BINARY" --headless --import --path .

      - name: Prepare build directories
        run: mkdir -p build/windows build/macos build/linux

      - name: Export Windows
        run: ".godot-ci/$GODOT_BINARY" --headless --path . --export-release "Windows Desktop" build/windows/dp.exe

      - name: Export macOS
        run: ".godot-ci/$GODOT_BINARY" --headless --path . --export-release "macOS" build/macos/dp.zip

      - name: Export Linux
        run: ".godot-ci/$GODOT_BINARY" --headless --path . --export-release "Linux/X11" build/linux/dp.x86_64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: divine-punishment-builds
          path: build/
          retention-days: 14
